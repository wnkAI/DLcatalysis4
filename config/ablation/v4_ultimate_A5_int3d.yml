data:
  data_representer: sequence_molecular_ultimate
  train_data_df: data/processed/folds/train_fold0.csv
  valid_data_df: data/processed/folds/valid_fold0.csv
  test_data_df: data/processed/folds/test_fold0.csv
  seq_lmdb:
    lmdb: data/processed/seq_prot5.lmdb
    map_size: 64424509440
    max_seq_len: 1000
    seq_fp: data/processed/seq.csv
  mol_graph_path: data/processed/mol_graphs.pt
  pocket_path: data/processed/pockets.pt
  rxn_drfp_npy: data/processed/rxn_drfp.npy
  rxn_drfp_keys_csv: data/processed/rxn_drfp_keys.csv
  rxn_center_pt: data/processed/rxn_center_mask.pt
  annotations_pt: data/processed/enzyme_annotations.pt
  annotation_vocab: data/processed/annotation_vocabs.json
model:
  model_name: v4_ultimate_A5_int3d
  hidden_dim: 128
  dropout: 0.2
  feature_norm: true
  loss_type: logcosh
  label_noise: 0.0
  pcc_loss_weight: 0.3
  rank_loss_weight: 0.1
  rank_loss_substrate_weight: 0.1
  rank_margin_enzyme: 0.1
  rank_margin_substrate: 0.1
  rank_max_pairs_enzyme: 16
  rank_max_pairs_substrate: 16
  rank_min_diff_enzyme: 0.1
  rank_min_diff_substrate: 0.1
  use_rxn_drfp: true
  use_rxn_center: true
  use_pocket: true
  use_int3d: true
  use_annot: false
  use_condition: false
  use_ec: false
  seq_module:
    seq_hidden_dim: 512
  substrate_gnn:
    enabled: true
    n_layers: 4
    dropout: 0.1
  int3d:
    n_layers: 2
    n_head: 4
    rbf_bins: 32
    max_dist: 20.0
  struct:
    in_s_dim: 26
    in_v_dim: 2
    v_hidden: 16
    gvp_layers: 3
    edge_s_dim: 16
    edge_v_dim: 1
    gate_init_bias: -2.0
  drfp_dim: 2048
  annot_vocab:
    interpro_family_vocab: 6000
    pfam_family_vocab: 3000
    go_term_vocab: 2000
    embed_dim: 32
    max_fam_per_enzyme: 16
  ec:
    ec1_vocab: 8
    ec2_vocab: 200
    ec3_vocab: 200
    ec4_vocab: 1200
    ec_embed_dim: 16
  embedding:
    morgan: false
    molt5: false
    grover: false
    unimol: false
    pro_seq: true
  use_msa: false
  output_header:
    act_fn: relu
    hidden_dim: 256
    norm_fn: layer
    num_layers: 4
train:
  batch_size: 10
  max_epochs: 100
  min_epochs: 20
  earlystrop_patience: 25
  grad_accum: 2
  precision: bf16-mixed
  seed: 42
  valid_freq: 1.0
  n_cpus: 8
  n_gpu:
  - 0
  device: cuda
  checkpoint_path: train/ckpt_ablation/v4_ultimate_A5_int3d
  log_path: train/log_ablation/v4_ultimate_A5_int3d
  optimizer:
    name: adamW
    lr: 8.0e-05
    weight_decay: 0.01
    warm_epoch: 5
    sched_factor: 0.5
    sched_patience: 10
    min_lr: 1.0e-06
