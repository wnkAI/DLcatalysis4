# DLcatalysis 4.0 — v4-minimal (2 分支残差，无结构)
#
# pred = y_seq + g * y_sub
#
# 用途：和 3.0 对标 baseline，验证数据 pipeline + 核心残差骨架。
# 结构分支 (y_struct, y_int3d) 在 v4-pocket/v4-fusion 版本加入。

data:
  data_representer: sequence_molecular
  train_data_df: data/processed/folds/train_fold0.csv
  valid_data_df: data/processed/folds/valid_fold0.csv
  test_data_df:  data/processed/folds/test_fold0.csv
  seq_lmdb:
    lmdb:        data/processed/seq_prot5.lmdb
    map_size:    64424509440             # 60 GB
    max_seq_len: 1000
    seq_fp:      data/processed/seq.csv
  mol_graph_path: data/processed/mol_graphs.pt

model:
  model_name: dlcat4_minimal
  hidden_dim: 128
  dropout: 0.20
  feature_norm: true
  loss_type: logcosh
  label_noise: 0.0
  pcc_loss_weight: 0.3
  rank_loss_weight: 0.1
  rank_loss_substrate_weight: 0.1
  rank_margin_enzyme: 0.1
  rank_margin_substrate: 0.1
  rank_max_pairs_enzyme: 16
  rank_max_pairs_substrate: 16
  rank_min_diff_enzyme: 0.1
  rank_min_diff_substrate: 0.1

  seq_module:
    seq_hidden_dim: 512

  substrate_gnn:
    enabled: true
    n_layers: 4
    dropout: 0.10

  # EC embedding (optional, residual signal)
  use_ec: true
  ec:
    ec1_vocab: 8
    ec2_vocab: 200
    ec3_vocab: 200
    ec4_vocab: 1200
    ec_embed_dim: 16

  # 不用的模态一律关掉（v4-minimal 只用 ProtT5 + GINE）
  embedding:
    morgan: false
    molt5: false
    grover: false
    unimol: false
    pro_seq: true
  use_msa: false

  output_header:
    act_fn: relu
    hidden_dim: 256
    norm_fn: layer
    num_layers: 4

train:
  batch_size: 16
  max_epochs: 60
  min_epochs: 10
  earlystrop_patience: 15
  grad_accum: 1
  precision: bf16-mixed          # A100 原生 bf16
  seed: 42
  valid_freq: 1.0
  n_cpus: 8
  n_gpu: [0]
  device: cuda
  checkpoint_path: train/ckpt_minimal
  log_path: train/log_minimal
  optimizer:
    name: adamW
    lr: 1.0e-4
    weight_decay: 1.0e-2
    warm_epoch: 3
    sched_factor: 0.5
    sched_patience: 10
    min_lr: 1.0e-6
